name: daily-tracker

# Pull the latest results, refit, and refresh every forecast/report once a day.
# Runs only during the tournament; the `gate` job hard-stops it after 2026-07-17
# (the final is 2026-07-19). GitHub cron has no end date, so the gate enforces it.
on:
  schedule:
    - cron: "0 12 * 6,7 *"     # 12:00 UTC daily, June–July only
  workflow_dispatch: {}        # allow manual runs from the Actions tab

permissions:
  contents: write              # so the bot can commit the refreshed reports

concurrency:
  group: daily-tracker
  cancel-in-progress: true

env:
  TRACKER_END: "20260717"      # last day the tracker runs (inclusive)

jobs:
  # Hard stop: skip everything once we're past the tournament end date.
  gate:
    runs-on: ubuntu-latest
    outputs:
      active: ${{ steps.check.outputs.active }}
    steps:
      - id: check
        run: |
          today=$(date -u +%Y%m%d)
          if [ "$today" -le "$TRACKER_END" ]; then
            echo "active=true"  >> "$GITHUB_OUTPUT"
          else
            echo "active=false" >> "$GITHUB_OUTPUT"
            echo "Past ${TRACKER_END} — daily tracker retired; skipping."
          fi

  track:
    needs: gate
    if: needs.gate.outputs.active == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Refresh tracker (pull results -> refit -> forecast -> log)
        # LLM keys are optional: either enables the judge/extractor (OpenAI or
        # Claude); the pipeline runs on deterministic fallbacks without them.
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make daily PY=python   # deps are installed into the runner's Python

      - name: Commit refreshed forecasts
        run: |
          git config user.name  "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add docs/ artifacts/*.png data/processed/*.csv
          git commit -m "tracker: daily refresh $(date -u +%F)" || echo "no changes"
          git push
